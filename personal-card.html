<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人信息卡片</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  h1 {
    color: #fff;
    margin-bottom: 24px;
    font-size: 28px;
    letter-spacing: 2px;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    padding: 40px;
    width: 380px;
    text-align: center;
  }

  .avatar-wrapper {
    position: relative;
    width: 120px;
    height: 120px;
    margin: 0 auto 24px;
    cursor: pointer;
  }

  .avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #667eea;
  }

  .avatar-overlay {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
    color: #fff;
    font-size: 14px;
  }

  .avatar-wrapper:hover .avatar-overlay { opacity: 1; }

  #avatarInput { display: none; }

  .field {
    margin-bottom: 16px;
    text-align: left;
  }

  .field label {
    display: block;
    font-size: 13px;
    color: #888;
    margin-bottom: 6px;
    font-weight: 600;
  }

  .field input,
  .field textarea {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.3s;
  }

  .field input:focus,
  .field textarea:focus {
    border-color: #667eea;
  }

  .field textarea {
    resize: vertical;
    min-height: 80px;
  }

  .display-name {
    font-size: 22px;
    font-weight: 700;
    color: #333;
    margin-bottom: 8px;
  }

  .display-bio {
    font-size: 14px;
    color: #666;
    line-height: 1.6;
    margin-bottom: 24px;
    min-height: 44px;
  }

  .btn-save {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .btn-save:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.5);
  }

  .btn-save:active { transform: translateY(0); }

  .saved-hint {
    color: #4caf50;
    font-size: 13px;
    margin-top: 12px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .saved-hint.show { opacity: 1; }
</style>
</head>
<body>

<h1>个人信息卡片</h1>

<div class="card">
  <!-- Avatar -->
  <div class="avatar-wrapper" id="avatarWrapper">
    <img class="avatar" id="avatarImg" src="https://api.dicebear.com/7.x/avataaars/svg?seed=default" alt="头像">
    <div class="avatar-overlay">更换头像</div>
  </div>
  <input type="file" id="avatarInput" accept="image/*">

  <!-- Display area -->
  <div class="display-name" id="displayName">张三</div>
  <div class="display-bio" id="displayBio">这是一段个人简介，点击下方输入框可以修改内容。</div>

  <!-- Edit fields -->
  <div class="field">
    <label for="nameInput">姓名</label>
    <input type="text" id="nameInput" value="张三" placeholder="请输入姓名">
  </div>
  <div class="field">
    <label for="bioInput">个人简介</label>
    <textarea id="bioInput" placeholder="请输入个人简介">这是一段个人简介，点击下方输入框可以修改内容。</textarea>
  </div>

  <button class="btn-save" id="btnSave">保存</button>
  <div class="saved-hint" id="savedHint">✓ 保存成功</div>
</div>

<script>
  const nameInput = document.getElementById('nameInput');
  const bioInput = document.getElementById('bioInput');
  const displayName = document.getElementById('displayName');
  const displayBio = document.getElementById('displayBio');
  const btnSave = document.getElementById('btnSave');
  const savedHint = document.getElementById('savedHint');
  const avatarImg = document.getElementById('avatarImg');
  const avatarInput = document.getElementById('avatarInput');
  const avatarWrapper = document.getElementById('avatarWrapper');

  // Save
  btnSave.addEventListener('click', () => {
    displayName.textContent = nameInput.value.trim() || '未命名';
    displayBio.textContent = bioInput.value.trim() || '暂无简介';
    savedHint.classList.add('show');
    setTimeout(() => savedHint.classList.remove('show'), 1500);
  });

  // Avatar upload
  avatarWrapper.addEventListener('click', () => avatarInput.click());
  avatarInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (ev) => { avatarImg.src = ev.target.result; };
      reader.readAsDataURL(file);
    }
  });
</script>

</body>
</html>
